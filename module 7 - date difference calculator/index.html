<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date difference calculator</title>
    <style>
        *{
            margin:0px;
            padding:0px;
            font-family: sans-serif;
        }
        body{
            background-color: aqua;
        }
        .main{
            width:300px;
            margin:100px auto;
            background-color: white;
            padding:20px;
        }
        .main label{
            display:block;
            margin-top: 10px;
        }
        .main input{
            width:100%;
            height:30px;
        }
        .main button{
            background-color: blue;
            width:100%;
            padding:10px 0px;
            color:white;
            border: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="main">
        <h3>Date Difference Calculator</h3>

        <div>
            <label>
                From Date
            </label>
            <input type="datetime-local" id="fromDate">
        </div>

        <div>
            <label>
                To Date
            </label>
            <input type="datetime-local" id="toDate">
        </div>

        <button>Save</button>
    </div>
</body>
<script>
    let btn=document.querySelector("button")
    let fromDate=document.querySelector("#fromDate")
    let toDate=document.querySelector("#toDate")
    btn.addEventListener("click",function(){
        let fromDateObject=new Date(fromDate.value);
        let toDateObject=new Date(toDate.value);
        let fromDateObjectMil=fromDateObject.getTime();
        let toDateObjectMil=toDateObject.getTime();

        let diffMilSecConvertIntoSecond=(toDateObjectMil-fromDateObjectMil)/1000
        console.log(diffMilSecConvertIntoSecond)

        let oneMin=60
        let oneHour=oneMin*60
        let onedaySec=oneHour*24

        console.log(oneMin,oneHour,onedaySec);

        let finalDays=Math.floor(diffMilSecConvertIntoSecond/onedaySec)
        console.log("Days",finalDays)

        let remSecUtiDays=diffMilSecConvertIntoSecond % onedaySec
        console.log(remSecUtiDays)
        let finalHours=Math.floor(remSecUtiDays/oneHour)
        console.log("Hours",finalHours)

        

    })
</script>
</html>
