<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date difference calculator</title>

    <style>
        *{
            margin:0px;
            padding:0px;
            font-family: sans-serif;
        }
        body{
            background-color: aqua;
        }
        .main{
            width:300px;
            margin:100px auto;
            background-color: white;
            padding:20px;
        }
        .main label{
            display:block;
            margin-top: 10px;
        }
        .main input{
            width:100%;
            height:30px;
        }
        .main button{
            background-color: blue;
            width:100%;
            padding:10px 0px;
            color:white;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }

        .result{
            margin-top:15px;
            font-weight:bold;
            text-align:center;
        }

        .error{
            margin-top:10px;
            color:red;
            text-align:center;
        }
    </style>
</head>

<body>
    <div class="main">
        <h3>Date Difference Calculator</h3>

        <div>
            <label>From Date</label>
            <input type="datetime-local" id="fromDate">
        </div>

        <div>
            <label>To Date</label>
            <input type="datetime-local" id="toDate">
        </div>

        <button>Save</button>

        <div class="error" id="error"></div>
        <div class="result" id="result"></div>
    </div>

<script>
    let btn=document.querySelector("button")
    let fromDate=document.querySelector("#fromDate")
    let toDate=document.querySelector("#toDate")
    let result=document.querySelector("#result")
    let error=document.querySelector("#error")

    btn.addEventListener("click",function(){

        // clear old output
        error.innerText=""
        result.innerText=""

        // validation
        if(fromDate.value==="" || toDate.value===""){
            error.innerText="Please select both dates"
            return
        }

        let fromDateObject=new Date(fromDate.value);
        let toDateObject=new Date(toDate.value);

        let fromDateObjectMil=fromDateObject.getTime();
        let toDateObjectMil=toDateObject.getTime();

        // check order
        if(toDateObjectMil < fromDateObjectMil){
            error.innerText="To Date must be after From Date"
            return
        }

        let diffMilSecConvertIntoSecond=(toDateObjectMil-fromDateObjectMil)/1000

        let oneMin=60
        let oneHour=oneMin*60
        let onedaySec=oneHour*24

        let finalDays=Math.floor(diffMilSecConvertIntoSecond/onedaySec)

        let remSecUtiDays=diffMilSecConvertIntoSecond % onedaySec

        let finalHours=Math.floor(remSecUtiDays/oneHour)

        let remSecAfterHours=remSecUtiDays % oneHour

        let finalMinutes=Math.floor(remSecAfterHours/oneMin)

        // show result
        result.innerText=`${finalDays} Days, ${finalHours} Hours, ${finalMinutes} Minutes`

    })
</script>

</body>
</html>
